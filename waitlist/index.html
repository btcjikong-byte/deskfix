<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeskFix 等待列表管理后台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    </style>
</head>
<body class="bg-gray-100">
    <div class="min-h-screen">
        <!-- 顶部导航 -->
        <nav class="bg-blue-600 text-white shadow-lg">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-16 items-center">
                    <h1 class="text-2xl font-bold">DeskFix 等待列表管理后台</h1>
                    <div class="flex gap-4">
                        <a href="https://btcjikong-byte.github.io/deskfix/" target="_blank" class="hover:text-blue-200">
                            查看网站 →
                        </a>
                    </div>
                </div>
            </div>
        </nav>

        <!-- 主要内容 -->
        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <!-- 统计卡片 -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                <div class="bg-white rounded-lg shadow p-6">
                    <div class="text-sm text-gray-500 mb-1">总用户数</div>
                    <div class="text-3xl font-bold text-blue-600" id="total-users">-</div>
                </div>
                <div class="bg-white rounded-lg shadow p-6">
                    <div class="text-sm text-gray-500 mb-1">最近 7 天新增</div>
                    <div class="text-3xl font-bold text-green-600" id="new-users-7d">-</div>
                </div>
                <div class="bg-white rounded-lg shadow p-6">
                    <div class="text-sm text-gray-500 mb-1">主要体态问题</div>
                    <div class="text-lg font-semibold text-purple-600" id="top-issue">-</div>
                </div>
                <div class="bg-white rounded-lg shadow p-6">
                    <div class="text-sm text-gray-500 mb-1">主要来源</div>
                    <div class="text-lg font-semibold text-orange-600" id="top-source">-</div>
                </div>
            </div>

            <!-- 操作按钮 -->
            <div class="flex gap-4 mb-6">
                <button onclick="loadStats()" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition">
                    🔄 刷新数据
                </button>
                <button onclick="exportCSV()" class="bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700 transition">
                    📥 导出 CSV
                </button>
            </div>

            <!-- 用户列表 -->
            <div class="bg-white rounded-lg shadow overflow-hidden">
                <div class="px-6 py-4 border-b border-gray-200">
                    <h2 class="text-xl font-bold text-gray-800">用户列表</h2>
                </div>
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ID</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">邮箱</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">体态问题</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">时间承诺</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">价格区间</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">来源</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">创建时间</th>
                            </tr>
                        </thead>
                        <tbody class="bg-white divide-y divide-gray-200" id="users-table">
                            <tr>
                                <td colspan="7" class="px-6 py-4 text-center text-gray-500">加载中...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <!-- 分页 -->
                <div class="px-6 py-4 border-t border-gray-200 flex justify-between items-center">
                    <div class="text-sm text-gray-500" id="pagination-info">-</div>
                    <div class="flex gap-2">
                        <button onclick="prevPage()" class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 transition" id="prev-btn">上一页</button>
                        <button onclick="nextPage()" class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 transition" id="next-btn">下一页</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_BASE = 'http://localhost:8086/api';
        let currentPage = 1;
        let totalPages = 1;

        // 加载统计数据
        async function loadStats() {
            try {
                const response = await fetch(`${API_BASE}/waitlist/stats`);
                const stats = await response.json();
                
                document.getElementById('total-users').textContent = stats.total || 0;
                document.getElementById('new-users-7d').textContent = stats.last_7_days || 0;
                
                // 找出最多的体态问题
                if (stats.by_posture_issue && stats.by_posture_issue.length > 0) {
                    const top = stats.by_posture_issue.reduce((a, b) => a.count > b.count ? a : b);
                    document.getElementById('top-issue').textContent = top.posture_issue || '未填写';
                }
                
                // 找出最多的来源
                if (stats.by_source && stats.by_source.length > 0) {
                    const top = stats.by_source.reduce((a, b) => a.count > b.count ? a : b);
                    document.getElementById('top-source').textContent = top.source || '未知';
                }
            } catch (error) {
                console.error('加载统计失败:', error);
                alert('加载统计数据失败，请确保后端服务已启动');
            }
        }

        // 加载用户列表
        async function loadUsers(page = 1) {
            try {
                const response = await fetch(`${API_BASE}/waitlist/users?page=${page}&limit=50`);
                const data = await response.json();
                
                totalPages = Math.ceil(data.total / data.limit);
                currentPage = page;
                
                const tbody = document.getElementById('users-table');
                
                if (data.users.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" class="px-6 py-4 text-center text-gray-500">暂无数据</td></tr>';
                } else {
                    tbody.innerHTML = data.users.map(user => `
                        <tr class="hover:bg-gray-50">
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${user.id}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${user.email}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">${user.posture_issue || '-'}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">${user.time_commitment || '-'}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">${user.price_range || '-'}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">${user.source || '-'}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">${new Date(user.created_at).toLocaleString('zh-CN')}</td>
                        </tr>
                    `).join('');
                }
                
                // 更新分页信息
                document.getElementById('pagination-info').textContent = `第 ${page} 页 / 共 ${totalPages} 页 (${data.total} 条记录)`;
                document.getElementById('prev-btn').disabled = page === 1;
                document.getElementById('next-btn').disabled = page === totalPages;
                
            } catch (error) {
                console.error('加载用户列表失败:', error);
                document.getElementById('users-table').innerHTML = '<tr><td colspan="7" class="px-6 py-4 text-center text-red-500">加载失败，请确保后端服务已启动</td></tr>';
            }
        }

        // 导出 CSV
        async function exportCSV() {
            try {
                const response = await fetch(`${API_BASE}/waitlist/export`);
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `deskfix-waitlist-${new Date().toISOString().split('T')[0]}.csv`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(url);
            } catch (error) {
                console.error('导出失败:', error);
                alert('导出失败，请确保后端服务已启动');
            }
        }

        // 分页
        function prevPage() {
            if (currentPage > 1) {
                loadUsers(currentPage - 1);
            }
        }

        function nextPage() {
            if (currentPage < totalPages) {
                loadUsers(currentPage + 1);
            }
        }

        // 页面加载时初始化
        loadStats();
        loadUsers();
        
        // 每 30 秒自动刷新
        setInterval(loadStats, 30000);
    </script>
</body>
</html>
